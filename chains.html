<script defer src="https://use.fontawesome.com/releases/v5.0.8/js/all.js"></script>
<script src="https://d3js.org/d3.v4.min.js"></script>
<script src="https://d3js.org/d3-force.v1.min.js"></script>
<!--
Use the Link Force in the d3-force module to represent chains.
Use a simulation.force to represent a machine, including forces for links, collision, gravity, floor and lift.
Provide interface handlers to:
1. adjust parameters: gravity, speed, height, range, and squeeze
2. click to change node color
3. drag to move nodes
-->
<style>
html, body { margin:0; padding:0; overflow:hidden; }
.link { stroke-width: 5px; stroke: #444 }
#params { position:relative; padding:10px; font-family:monaco; font-size:24px; color:lightblue; text-align:center; }
#chaindesc { position:relative; padding:10px; font-family:monaco; font-size:24px; color:lightblue; text-align:center; }
#chainarea { position: relative; height: calc(100% - 200px); width: 100%; padding:0px; background-color: #333; }
#chainarea svg { position:relative; height:100%; width:100%; background-color: grey; }
.darkmode { background-color: black; }
#params input { field-sizing: content; font-family:monaco; font-size:24px; color:lightblue; background-color:black; }
</style>

<div class="darkmode">
    <div id="params">
        <label for="gravity">Gravity</label>: <input id="gravity" type="number" inputmode="numeric" min="0" max="10" step="1"></input>
        <label for="speed">Speed</label>: <input id="speed" type="number" inputmode="numeric" min="0" max="10" step="1"></input>
        <label for="height">Height</label>: <input id="height" type="number" inputmode="numeric" min="0" max="10" step="1"></input>
        <label for="range">Width</label>: <input id="range" type="number" inputmode="numeric" min="0" max="10" step="1"></input>
        <label for="squeeze">Squeeze</label>: <input id="squeeze" type="number" inputmode="numeric" min="0" max="10" step="1"></input>
    </div>
    <div id="chainarea"><svg id="chains"></svg></div>
    <div id="chaindesc">Inspired by <a href="https://www.arthurganson.com/roller-chain-1" target="_blank">Machine with Roller Chain</a> by Arthur Ganson</div>
</div>

<script>

// define parameters, elements, and positional variables
var params = {
    count: 40,
    radius: 30,
    speed: 3,
    gravity: 5,
    height: 6,
    squeeze: 2,
    range: 2
};
var c20 = d3.schemeCategory20;
var svg = d3.select("#chains");
var svgEl = document.getElementById("chains");
var svgX = svgEl.clientWidth, svgY = svgEl.clientHeight;
var midX = 0.5*svgX, midY = 0.75*svgY;
var deltaX = midX/params.count;

// handle parameter editing
function initParam(name) {
    var el = document.getElementById(name);
    el.value = params[name];
    el.addEventListener('input', (event) => {
        params[name] = parseInt(event.target.value);
        setForces();
    });
}
for (const p of ["gravity", "speed", "height", "squeeze", "range"]) {
    initParam(p);
}


// define nodes and links
var nodes = [];
for (var i = 0; i < params.count; ++i) {
    var node = { id:`node${i}`, type:'pin', radius:params.radius, x:midX/2 + deltaX*i, y:midY, fill:c20[Math.trunc(Math.random()*20)], vx:0, vy:0 };
    nodes.push(node);
}
var links = [];
for (i=0; i<params.count; ++i) {
    let t = (i >= params.count-1 ? 0 : i+1);
    var link = { source:nodes[i], target:nodes[t], value:0 };
    links.push(link);
}
var simulation = d3.forceSimulation(nodes);


// update graphical elements (nodes and links)

function idtonode(id) {
    if (typeof id !== "string") { return id; }
    return nodes.find(d => d.id === id);
}

function updateelements() {
    ns = svg.selectAll(".node").data(nodes);
	ns.enter().append("svg:circle")
        .classed("node",true)
        .attr("id", function(d) { return d.id; })
		.attr("r", function(d) { return d.radius - 2; })
        .attr("cx", function(d) { return d.x; })
    	.attr("cy", function(d) { return d.y; })
		.style("fill", function(d, i) { return d.fill; })
		.on("click",clicked)
		.call(d3.drag()
            .on("start",dragstarted)
            .on("drag",dragged)
            .on("end",dragended));
	ns.transition()
        .duration(100)
		.attr("r", function(d) { return d.radius - 2; })
		.style("fill", function(d, i) { return d.fill; });
	ns.exit().remove();

    ls = svg.selectAll(".link").data(links);
    ls.enter().append("svg:line")
        .classed("link",true)
        .attr("id", function(d) { return d.id; })
        .attr("x1", function(d) { return idtonode(d.source).x; })
        .attr("y1", function(d) { return idtonode(d.source).y; })
        .attr("x2", function(d) { return idtonode(d.target).x; })
        .attr("y2", function(d) { return idtonode(d.target).y; })
		.on("click",clicked)
    ls.exit().remove();
}

updateelements();


// Handle node clicking and dragging

function clicked(d) {
	if (d3.event.defaultPrevented) return; // prevent when dragged
    if (d.type == 'pin') {
	    d.fill = c20[Math.trunc(Math.random()*20)];
	    d3.select(this).transition()
		    .style("fill", function(d, i) { return d.fill; });
    }
}

function dragstarted(d) {
    simulation.restart();
    simulation.velocityDecay(0.01);
	d.sx = 0;
	d.sy = 0;
    d.fx = d.x;
    d.fy = d.y;
}

function dragged(d) {
	d.sx = d3.event.x - d.fx;
	d.sy = d3.event.y - d.fy;
    d.fx = d3.event.x;
    d.fy = d3.event.y;
}

function dragended(d) {
    d.vx = d.sx;
    d.vy = d.sy;
    d.fx = null;
    d.fy = null;
    simulation.alphaTarget(0.1);
}

function strengthMax(link) {
  return 0.5;
}


// Define forces, including for the floor and lift

function forceFloor(alpha) {
  for (let i = 0, n = nodes.length, node, k = alpha * 0.1; i < n; ++i) {
    node = nodes[i];
    let fixed = false;
    if (node.x > (midX - params.radius/2) && node.x < (midX + params.radius/2) && node.y > (midY - params.radius*params.height) && node.y < (midY + params.radius*4)) {
        node.vx = 0;
        node.vy = -params.speed*params.radius/20;
        fixed = true;
    }
    if (!fixed) {
        if (node.x < (midX-2*params.radius*params.range)) {
            node.vx += 0.2*params.squeeze; //*20*Math.abs(node.x - svgX/2)/svgX;
        }
        if (node.x > (midX+2*params.radius*params.range)) {
            node.vx += -0.2*params.squeeze; //*20*Math.abs(node.x - svgX/2)/svgX;
        }
        if (node.y > midY) {
            // node.y = midY; 
            // node.y -= 2;
            node.vy = -0.1;
        }
    }
  }
}

function setForces() {
    simulation.force("links", d3.forceLink(links).distance(params.radius*1.5).iterations(100));
    simulation.force("collide", d3.forceCollide().radius(d => d.radius).iterations(100));
    simulation.force("gravity", d3.forceY(midY+40).strength(0.01*params.gravity));
    simulation.force("floor", forceFloor);
}

setForces();


simulation.velocityDecay(0.01);
simulation.alphaTarget(0.1);
simulation.on("tick", function(e) {
	svg.selectAll(".node")
		.attr("cx", function(d) { return d.x||100; })
		.attr("cy", function(d) { return d.y||100; });
    svg.selectAll(".link")
        .attr("x1", d => idtonode(d.source).x)
        .attr("y1", d => idtonode(d.source).y)
        .attr("x2", d => idtonode(d.target).x)
        .attr("y2", d => idtonode(d.target).y);
});

</script>
